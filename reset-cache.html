<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset MUSIC SCHOOL OTS Cache</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0b18;
      --panel: #181326;
      --text: #fff8f2;
      --muted: #c5b8d4;
      --accent: #ff7a2a;
      --accent-2: #8b5cf6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 122, 42, 0.24), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(139, 92, 246, 0.28), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      padding: 36px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    .brand {
      display: inline-grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      margin-bottom: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #ef6c9d, var(--accent-2));
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      justify-content: center;
      width: 100%;
      padding: 18px 22px;
      border-radius: 18px;
      color: white;
      text-decoration: none;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #ef6c9d, var(--accent-2));
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">OTS</div>
    <h1>Cache cleared.</h1>
    <p id="status">Clearing old app files from this browser...</p>
    <a id="continue-link" href="./">Open student login</a>
  </main>
  <script>
    async function resetAppCache() {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        localStorage.removeItem("ots-admin-token");
        localStorage.removeItem("ots-student-token");

        document.querySelector("#status").textContent = "Done. Open the student login again.";
      } catch (error) {
        document.querySelector("#status").textContent = "Cache reset finished with a small browser warning. Open the student login again.";
      }
    }

    resetAppCache();
  </script>
</body>
</html>
